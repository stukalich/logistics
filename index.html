  { topic:'t2', term:'Атрибут Agility (SCOR)', def:'Гибкость цепи поставок — способность адаптироваться к изменениям. Метрика: Supply Chain Agility (AG.1.1).' },
  { topic:'t2', term:'ATO (Assemble-to-Order)', def:'Сборка под заказ: компоненты хранятся, финальная сборка выполняется только по конкретному заказу клиента. CODP перед финальной сборкой.' },
  { topic:'t3', term:'Метод Дельфи', def:'Качественный метод прогнозирования на основе достижения консенсуса группы экспертов через несколько итеративных раундов анонимных опросов.' },
  { topic:'t3', term:'Операционный уровень планирования', def:'Ежедневное выполнение планов и адаптация к изменяющимся условиям. Горизонт — от одного дня до нескольких недель.' },
  { topic:'t4', term:'AX-группа (ABC-XYZ)', def:'Наиболее приоритетные товары: высокая выручка (A) + стабильный спрос (X). Расширять ассортимент и поднимать продажи.' },
  { topic:'t4', term:'CZ-группа (ABC-XYZ)', def:'Наименее приоритетные товары: низкая выручка (C) + непредсказуемый спрос (Z). Оставить только универсальные позиции.' },
  { topic:'t4', term:'Коммерческий аспект снабжения', def:'Переговоры с поставщиками и заключение договора на поставку товаров или услуг.' },
  { topic:'t6', term:'Последняя миля', def:'Финальный, наиболее затратный и сложный этап доставки товара непосредственно до конечного потребителя.' },
  { topic:'t6', term:'Интенсивный сбыт', def:'Стратегия максимально широкого присутствия продукта во всех возможных точках продаж. Применяется при маркетинговой стратегии широкого охвата.' },
  { topic:'t6', term:'Горизонтальная интеграция', def:'Объединение компаний одного уровня канала распределения (например, нескольких дистрибьюторов или ретейлеров).' },
  { topic:'t6', term:'Вертикальная интеграция', def:'Объединение компаний на разных уровнях канала распределения. Формы: имущественная (слияния) и договорная (франчайзинг, кооперативы).' },
  { topic:'t7', term:'Переменная D в EOQ', def:'Годовое потребление товара (единиц в год) — числитель в формуле Уилсона EOQ = √(2DS/H).' },
  { topic:'t7', term:'Переменная H в EOQ', def:'Затраты на хранение единицы товара в год (включая складские расходы, ущерб от порчи, налоги и т.д.).' },
  { topic:'t7', term:'Периодический контроль запасов', def:'Проверки запасов с фиксированной периодичностью (ежемесячно, ежеквартально). Управляющие решения принимаются в соответствии с установленной периодичностью.' },
  { topic:'t8', term:'WMS', def:'Warehouse Management System — информационная система управления складом. Рекомендуется при номенклатуре >1000 артикулов или площади >1000 кв. м.' },
  { topic:'t8', term:'WCS', def:'Warehouse Control System — система управления автоматизированным оборудованием склада в реальном времени. Посредник между WMS/ERP и оборудованием.' },
  { topic:'t8', term:'Схема «U» (планировка склада)', def:'Планировка для складов любого размера: зоны погрузки и разгрузки расположены рядом, между ними — зона кросс-докинга или быстрого оборота.' },
  { topic:'t8', term:'Консолидация (функция склада)', def:'Объединение партий товаров от нескольких поставщиков в единую отправку для одного потребителя.' },
  { topic:'t8', term:'Ричтрак', def:'Складской штабелер с выдвижными вилами, высота подъёма до 12 метров. Используется для работы с высокими стеллажами.' },
  { topic:'t9', term:'WMS в 3PL', def:'3PL-провайдер использует WMS для управления складами нескольких клиентов — один из ключевых активов провайдера.' },
  { topic:'t9', term:'Треугольник стабильности (Barroso)', def:'Три варианта восстановления ЦП после внешнего воздействия: полное восстановление (1), частичное (2), превышение прежнего уровня (3 — наилучший).' },
  { topic:'t9', term:'Локализация поставок', def:'Стратегия реконфигурации ЦП: перевод закупок на отечественных поставщиков для снижения зависимости от импорта.' },
];

// ==================== STATE ====================
let selectedTopic = 'all';
let selectedMode = 'quiz';
let sessionQuestions = [];
let currentQ = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let progress = {};
let fcCards = [];
let fcIndex = 0;
let fcFlipped = false;

// ==================== INIT ====================
function init() {
  // Count questions per topic
  TOPICS.forEach(t => {
    if (t.id === 'all') {
      t.qCount = QUESTIONS.length;
      t.fcCount = FLASHCARDS.length;
    } else {
      t.qCount = QUESTIONS.filter(q => q.topic === t.id).length;
      t.fcCount = FLASHCARDS.filter(f => f.topic === t.id).length;
    }
  });
  // Load progress
  try { progress = JSON.parse(localStorage.getItem('lq_progress') || '{}'); } catch(e) { progress = {}; }
  renderTopics();
}

function renderTopics() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = TOPICS.map(t => {
    const pct = progress[t.id] || 0;
    const circ = 2 * Math.PI * 14;
    const offset = circ - (pct / 100) * circ;
    return `<div class="topic-card ${selectedTopic === t.id ? 'selected' : ''}" onclick="selectTopic('${t.id}')">
      <div class="topic-icon">${t.icon}</div>
      <div class="topic-info">
        <div class="topic-name">${t.name}</div>
        <div class="topic-meta">${selectedMode === 'quiz' ? t.qCount + ' вопросов' : t.fcCount + ' флэшкарт'}</div>
      </div>
      <div class="topic-progress">
        <div class="prog-ring">
          <svg width="36" height="36" viewBox="0 0 36 36">
            <circle class="bg" cx="18" cy="18" r="14"/>
            <circle class="fill" cx="18" cy="18" r="14" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="prog-pct">${pct}%</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectTopic(id) {
  selectedTopic = id;
  renderTopics();
}

function selectMode(mode, el) {
  selectedMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTopics();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ==================== START ====================
function startSession() {
  if (selectedMode === 'flashcards') {
    startFlashcards();
  } else {
    startQuiz();
  }
}

function startQuiz() {
  let pool = selectedTopic === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.topic === selectedTopic);
  sessionQuestions = shuffle(pool).slice(0, Math.min(pool.length, 20));
  currentQ = 0; correct = 0; wrong = 0;
  showScreen('quiz');
  const t = TOPICS.find(t => t.id === selectedTopic);
  document.getElementById('quizTopicLabel').textContent = t ? t.name : 'Все темы';
  renderQuestion();
}

function startFlashcards() {
  let pool = selectedTopic === 'all' ? FLASHCARDS : FLASHCARDS.filter(f => f.topic === selectedTopic);
  fcCards = shuffle(pool);
  fcIndex = 0; fcFlipped = false;
  showScreen('flashcards');
  const t = TOPICS.find(t => t.id === selectedTopic);
  document.getElementById('fcTopicName').textContent = t ? t.name : 'Все темы';
  renderCard();
}

// ==================== QUIZ RENDER ====================
function renderQuestion() {
  answered = false;
  const q = sessionQuestions[currentQ];
  const total = sessionQuestions.length;

  document.getElementById('quizCounter').textContent = `${currentQ + 1}/${total}`;
  document.getElementById('progressBar').style.width = ((currentQ + 1) / total * 100) + '%';
  document.getElementById('nextBtn').classList.remove('show');

  const body = document.getElementById('quizBody');
  const typeLabel = { mcq:'Один правильный ответ', multi:'Несколько правильных ответов', input:'Введите ответ', match:'Сопоставление' }[q.type];
  let html = `<div class="q-type-tag">${typeLabel}</div><div class="q-text">${q.text}</div>`;

  if (q.type === 'mcq') {
    html += `<div class="options">` + q.opts.map((opt, i) => {
      const letters = 'АБВГ';
      return `<div class="option" id="opt${i}" onclick="answerMCQ(${i})">
        <div class="opt-letter">${letters[i]}</div>
        <div>${opt}</div>
      </div>`;
    }).join('') + `</div>`;
  } else if (q.type === 'multi') {
    html += `<div class="options" id="multiOpts">` + q.opts.map((opt, i) => {
      const letters = 'АБВГД';
      return `<div class="option" id="mopt${i}" onclick="toggleMulti(${i})">
        <div class="opt-letter" id="ml${i}">${letters[i]}</div>
        <div>${opt}</div>
      </div>`;
    }).join('') + `</div>
    <button class="multi-submit" id="multiSubmit" onclick="submitMulti()" disabled>Проверить</button>`;
  } else if (q.type === 'input') {
    html += `<div class="text-input-wrap">
      <input class="text-input" id="textInput" type="text" placeholder="Введите ответ..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') submitInput()">
      <div style="font-size:12px;color:var(--muted);padding:0 4px;">Подсказка: ${q.hint}</div>
      <button class="text-submit" onclick="submitInput()">Проверить</button>
    </div>`;
  } else if (q.type === 'match') {
    const shuffledDefs = shuffle(q.pairs.map(p => p.def));
    html += `<div class="match-wrap">` + q.pairs.map((pair, i) => {
      const opts = shuffledDefs.map(d => `<option value="${d}">${d}</option>`).join('');
      return `<div class="match-row">
        <div class="match-term">${pair.term}</div>
        <select class="match-select" id="match${i}">
          <option value="">— выберите —</option>
          ${opts}
        </select>
      </div>`;
    }).join('') + `</div>
    <button class="match-submit" onclick="submitMatch()">Проверить</button>`;
  }

  body.innerHTML = html;
  if (q.type === 'input') {
    setTimeout(() => document.getElementById('textInput')?.focus(), 100);
  }
}

function showFeedback(isCorrect, explanation) {
  const body = document.getElementById('quizBody');
  const fb = document.createElement('div');
  fb.className = `feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `<span class="feedback-icon">${isCorrect ? '✅' : '❌'}</span>
    <div class="feedback-text"><strong>${isCorrect ? 'Верно!' : 'Не совсем.'}</strong> ${explanation}</div>`;
  body.appendChild(fb);
  document.getElementById('nextBtn').classList.add('show');
  answered = true;
}

function answerMCQ(i) {
  if (answered) return;
  const q = sessionQuestions[currentQ];
  document.querySelectorAll('.option').forEach(o => o.classList.add('locked'));
  const isCorrect = i === q.correct;
  document.getElementById(`opt${i}`).classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) document.getElementById(`opt${q.correct}`).classList.add('correct');
  isCorrect ? correct++ : wrong++;
  showFeedback(isCorrect, q.explanation);
}

let multiSelected = new Set();
function toggleMulti(i) {
  if (answered) return;
  const el = document.getElementById(`mopt${i}`);
  if (multiSelected.has(i)) { multiSelected.delete(i); el.classList.remove('selected'); }
  else { multiSelected.add(i); el.classList.add('selected'); }
  document.getElementById('multiSubmit').disabled = multiSelected.size === 0;
}

function submitMulti() {
  if (answered) return;
  const q = sessionQuestions[currentQ];
  document.querySelectorAll('.option').forEach(o => o.classList.add('locked'));
  document.getElementById('multiSubmit').disabled = true;
  const selected = [...multiSelected].sort().join(',');
  const expected = [...q.correct].sort().join(',');
  const isCorrect = selected === expected;
  q.opts.forEach((_, i) => {
    if (q.correct.includes(i)) document.getElementById(`mopt${i}`).classList.add('correct');
    else if (multiSelected.has(i)) document.getElementById(`mopt${i}`).classList.add('wrong');
  });
  multiSelected = new Set();
  isCorrect ? correct++ : wrong++;
  showFeedback(isCorrect, q.explanation);
}

function submitInput() {
  if (answered) return;
  const q = sessionQuestions[currentQ];
  const val = document.getElementById('textInput').value.trim().toLowerCase();
  const isCorrect = q.answer.some(a => val === a.toLowerCase() || val.includes(a.toLowerCase()) || a.toLowerCase().includes(val));
  document.getElementById('textInput').classList.add(isCorrect ? 'correct' : 'wrong');
  document.getElementById('textInput').disabled = true;
  document.querySelector('.text-submit').disabled = true;
  isCorrect ? correct++ : wrong++;
  showFeedback(isCorrect, `Правильный ответ: ${q.answer[0]}. ${q.explanation}`);
}

function submitMatch() {
  if (answered) return;
  const q = sessionQuestions[currentQ];
  let allCorrect = true;
  q.pairs.forEach((pair, i) => {
    const sel = document.getElementById(`match${i}`);
    const isCorrect = sel.value === pair.def;
    sel.classList.add(isCorrect ? 'correct' : 'wrong');
    sel.disabled = true;
    if (!isCorrect) allCorrect = false;
  });
  document.querySelector('.match-submit').disabled = true;
  allCorrect ? correct++ : wrong++;
  showFeedback(allCorrect, q.explanation);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= sessionQuestions.length) {
    showResults();
  } else {
    document.getElementById('quizBody').scrollTop = 0;
    renderQuestion();
  }
}

// ==================== RESULTS ====================
function showResults() {
  const total = sessionQuestions.length;
  const pct = Math.round(correct / total * 100);
  const trophy = pct >= 90 ? '🏆' : pct >= 70 ? '🥈' : pct >= 50 ? '🥉' : '📚';
  const label = pct >= 90 ? 'Отлично! Вы знаете материал на высоком уровне.' : pct >= 70 ? 'Хорошо! Есть небольшие пробелы.' : pct >= 50 ? 'Неплохо, но стоит повторить материал.' : 'Рекомендуем ещё раз изучить тему.';

  document.getElementById('resultTrophy').textContent = trophy;
  document.getElementById('resultScore').textContent = `${pct}%`;
  document.getElementById('resultLabel').textContent = label;

  // Save progress
  const topicKey = selectedTopic;
  if (!progress[topicKey] || pct > progress[topicKey]) {
    progress[topicKey] = pct;
    try { localStorage.setItem('lq_progress', JSON.stringify(progress)); } catch(e) {}
  }

  document.getElementById('resultStats').innerHTML = `
    <div class="stat-row"><span>Вопросов всего</span><span class="stat-val">${total}</span></div>
    <div class="stat-row"><span>Правильно</span><span class="stat-val good">${correct}</span></div>
    <div class="stat-row"><span>Неправильно</span><span class="stat-val bad">${wrong}</span></div>
    <div class="stat-row"><span>Результат</span><span class="stat-val">${pct}%</span></div>
  `;
  showScreen('results');
}

function retryQuiz() {
  showScreen('quiz');
  currentQ = 0; correct = 0; wrong = 0;
  sessionQuestions = shuffle(sessionQuestions);
  renderQuestion();
}

// ==================== FLASHCARDS ====================
function renderCard() {
  const card = fcCards[fcIndex];
  fcFlipped = false;
  document.getElementById('fcCounter').textContent = `${fcIndex + 1} / ${fcCards.length}`;
  document.getElementById('fcSideLabel').textContent = 'ТЕРМИН';
  document.getElementById('fcFront').textContent = card.term;
  document.getElementById('fcFront').style.display = '';
  document.getElementById('fcBack').textContent = card.def;
  document.getElementById('fcBack').style.display = 'none';
  document.querySelector('.fc-flip-hint').style.display = '';
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('fcSideLabel').textContent = fcFlipped ? 'ОПРЕДЕЛЕНИЕ' : 'ТЕРМИН';
  document.getElementById('fcFront').style.display = fcFlipped ? 'none' : '';
  document.getElementById('fcBack').style.display = fcFlipped ? '' : 'none';
  document.querySelector('.fc-flip-hint').style.display = fcFlipped ? 'none' : '';
}

function fcPrev() { if (fcIndex > 0) { fcIndex--; renderCard(); } }
function fcNext() { if (fcIndex < fcCards.length - 1) { fcIndex++; renderCard(); } }
function fcShuffle() { fcCards = shuffle(fcCards); fcIndex = 0; renderCard(); }

// ==================== NAVIGATION ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() {
  showScreen('home');
  renderTopics();
}

// ==================== BOOT ====================
init();
</script>
</body>
</html>
