<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Логистика и УЦП — Квиз</title>
<style>
  :root {
    --bg: #0f1624;
    --surface: #1a2540;
    --surface2: #243058;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --gold: #f59e0b;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #2e3f6e;
    --radius: 14px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

  /* ========= SCREENS ========= */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ========= HOME ========= */
  #home { align-items: center; justify-content: flex-start; padding: 0 0 40px; }
  .home-hero {
    width: 100%; background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #2563eb 100%);
    padding: 40px 24px 36px; text-align: center; position: relative; overflow: hidden;
  }
  .home-hero::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .home-logo { font-size: 36px; margin-bottom: 12px; }
  .home-title { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
  .home-sub { font-size: 13px; color: #bfdbfe; }
  .home-badges { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
  .badge { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: #dbeafe; }

  .home-body { width: 100%; max-width: 480px; padding: 24px 16px 0; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

  .topic-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .topic-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; cursor: pointer; transition: all .18s; display: flex; align-items: center; gap: 14px;
  }
  .topic-card:hover, .topic-card.selected { border-color: var(--accent); background: var(--surface2); }
  .topic-icon { font-size: 22px; flex-shrink: 0; }
  .topic-info { flex: 1; }
  .topic-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .topic-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .topic-progress { width: 36px; text-align: right; }
  .prog-ring { position: relative; width: 36px; height: 36px; }
  .prog-ring svg { transform: rotate(-90deg); }
  .prog-ring .bg { fill: none; stroke: var(--border); stroke-width: 3; }
  .prog-ring .fill { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset .4s; }
  .prog-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--accent2); }

  .mode-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .mode-btn {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 10px; cursor: pointer; text-align: center; transition: all .18s; color: var(--text);
  }
  .mode-btn:hover, .mode-btn.active { border-color: var(--accent); background: var(--surface2); }
  .mode-btn .mode-icon { font-size: 24px; margin-bottom: 6px; }
  .mode-btn .mode-name { font-size: 13px; font-weight: 600; }
  .mode-btn .mode-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .start-btn {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .18s;
    letter-spacing: .3px;
  }
  .start-btn:hover { background: #2563eb; }
  .start-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* ========= QUIZ ========= */
  #quiz { padding: 0; }
  .quiz-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10;
  }
  .back-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 0 4px; }
  .quiz-topic { font-size: 13px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .quiz-counter { font-size: 13px; font-weight: 700; color: var(--accent2); white-space: nowrap; }

  .progress-bar-wrap { height: 4px; background: var(--border); }
  .progress-bar { height: 4px; background: var(--accent); transition: width .3s; }

  .quiz-body { flex: 1; padding: 20px 16px; max-width: 560px; margin: 0 auto; width: 100%; }
  .q-type-tag { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .q-text { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }

  /* MCQ options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; cursor: pointer; font-size: 14px; line-height: 1.4; transition: all .16s;
    display: flex; align-items: flex-start; gap: 10px; text-align: left;
  }
  .option:hover:not(.locked) { border-color: var(--accent); background: var(--surface2); }
  .option.correct { border-color: var(--green); background: rgba(34,197,94,.12); }
  .option.wrong { border-color: var(--red); background: rgba(239,68,68,.12); }
  .option.locked { cursor: default; }
  .opt-letter {
    width: 24px; height: 24px; border-radius: 50%; background: var(--surface2); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
    flex-shrink: 0; transition: all .16s;
  }
  .option.correct .opt-letter { background: var(--green); border-color: var(--green); color: #fff; }
  .option.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #fff; }

  /* Multi-select */
  .multi-submit { margin-top: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
  .multi-submit:disabled { background: var(--border); color: var(--muted); }

  /* Text input */
  .text-input-wrap { display: flex; flex-direction: column; gap: 10px; }
  .text-input {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 12px 16px; font-size: 15px; color: var(--text); outline: none; width: 100%;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input.correct { border-color: var(--green); background: rgba(34,197,94,.1); }
  .text-input.wrong { border-color: var(--red); background: rgba(239,68,68,.1); }
  .text-submit { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }

  /* Match */
  .match-wrap { display: flex; flex-direction: column; gap: 8px; }
  .match-row { display: flex; gap: 10px; align-items: center; }
  .match-term { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 13px; font-weight: 600; }
  .match-select {
    flex: 1.2; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 12px; color: var(--text); outline: none; cursor: pointer;
    -webkit-appearance: none; appearance: none;
  }
  .match-select.correct { border-color: var(--green); }
  .match-select.wrong { border-color: var(--red); }
  .match-submit { margin-top: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }

  /* Feedback */
  .feedback {
    margin-top: 16px; background: var(--surface2); border-radius: var(--radius); padding: 14px 16px;
    font-size: 13px; line-height: 1.5; border-left: 3px solid var(--border);
  }
  .feedback.correct-fb { border-left-color: var(--green); }
  .feedback.wrong-fb { border-left-color: var(--red); }
  .feedback-icon { font-size: 18px; margin-bottom: 6px; display: block; }
  .feedback-text { color: var(--text); }

  .next-btn {
    position: sticky; bottom: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border);
    padding: 14px 16px; display: none;
  }
  .next-btn.show { display: block; }
  .next-btn button { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .next-btn button:hover { background: #2563eb; }

  /* ========= FLASHCARDS ========= */
  #flashcards { align-items: center; }
  .fc-header {
    width: 100%; background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  }
  .fc-body { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; width: 100%; max-width: 480px; }
  .fc-counter { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .fc-card {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; min-height: 200px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 28px 24px; cursor: pointer;
    text-align: center; transition: transform .15s, box-shadow .15s; position: relative;
    overflow: hidden;
  }
  .fc-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,.15); }
  .fc-side-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .fc-term { font-size: 20px; font-weight: 700; color: var(--accent2); line-height: 1.3; }
  .fc-definition { font-size: 14px; line-height: 1.6; color: var(--text); }
  .fc-flip-hint { font-size: 11px; color: var(--muted); margin-top: 10px; }
  .fc-nav { display: flex; gap: 12px; margin-top: 20px; width: 100%; }
  .fc-nav button {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; color: var(--text); font-size: 14px; cursor: pointer; transition: all .15s;
  }
  .fc-nav button:hover { border-color: var(--accent); background: var(--surface2); }
  .fc-nav button:disabled { opacity: .4; cursor: not-allowed; }
  .fc-shuffle { margin-top: 12px; width: 100%; background: transparent; border: 1px dashed var(--border); border-radius: var(--radius); padding: 10px; color: var(--muted); font-size: 13px; cursor: pointer; }
  .fc-shuffle:hover { border-color: var(--accent); color: var(--accent2); }

  /* ========= RESULTS ========= */
  #results { align-items: center; padding: 40px 20px; }
  .results-body { width: 100%; max-width: 440px; }
  .result-trophy { font-size: 64px; text-align: center; margin-bottom: 16px; }
  .result-score { font-size: 48px; font-weight: 800; text-align: center; color: var(--accent2); }
  .result-label { text-align: center; color: var(--muted); font-size: 15px; margin-bottom: 24px; }
  .result-stats { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-val { font-weight: 700; }
  .stat-val.good { color: var(--green); }
  .stat-val.bad { color: var(--red); }
  .result-actions { display: flex; gap: 10px; flex-direction: column; }
  .btn-secondary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; width: 100%; }
  .btn-secondary:hover { border-color: var(--accent); }

  /* ========= TOPIC SELECT OVERLAY ========= */
  #topicSelect {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  #topicSelect.open { display: flex; }
  .ts-sheet {
    background: var(--surface); border-radius: 18px 18px 0 0; width: 100%; max-width: 480px;
    max-height: 80vh; overflow-y: auto; padding: 0 0 24px;
  }
  .ts-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 16px; }
  .ts-title { font-size: 15px; font-weight: 700; padding: 0 20px 12px; border-bottom: 1px solid var(--border); }
  .ts-list { padding: 8px 16px; display: flex; flex-direction: column; gap: 6px; }
  .ts-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .ts-item:hover, .ts-item.sel { border-color: var(--accent); background: var(--surface2); }
  .ts-item-icon { font-size: 18px; }
  .ts-item-name { font-size: 13px; font-weight: 600; flex: 1; }
  .ts-check { color: var(--green); font-size: 16px; }
  .ts-apply { margin: 16px 16px 0; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; width: calc(100% - 32px); }
</style>
</head>
<body>

<!-- =========== HOME =========== -->
<div id="home" class="screen active">
  <div class="home-hero">
    <div class="home-logo">📦</div>
    <div class="home-title">Логистика и управление<br>цепями поставок</div>
    <div class="home-sub">Высшая школа бизнеса НИУ ВШЭ · Проф. Герами</div>
    <div class="home-badges">
      <span class="badge">10 тем</span>
      <span class="badge">178 вопросов</span>
      <span class="badge">73 флэшкарты</span>
    </div>
  </div>

  <div class="home-body">
    <div class="section-label">Режим</div>
    <div class="mode-row">
      <div class="mode-btn active" data-mode="quiz" onclick="selectMode('quiz',this)">
        <div class="mode-icon">🧠</div>
        <div class="mode-name">Квиз</div>
        <div class="mode-desc">Проверь знания</div>
      </div>
      <div class="mode-btn" data-mode="flashcards" onclick="selectMode('flashcards',this)">
        <div class="mode-icon">🃏</div>
        <div class="mode-name">Флэшкарты</div>
        <div class="mode-desc">Термины</div>
      </div>
    </div>

    <div class="section-label">Тема</div>
    <div class="topic-grid" id="topicGrid"></div>

    <button class="start-btn" id="startBtn" onclick="startSession()">Начать</button>
  </div>
</div>

<!-- =========== QUIZ =========== -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="quiz-topic" id="quizTopicLabel"></div>
    <div class="quiz-counter" id="quizCounter">1/10</div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="quiz-body" id="quizBody"></div>
  <div class="next-btn" id="nextBtn"><button onclick="nextQuestion()">Следующий вопрос →</button></div>
</div>

<!-- =========== FLASHCARDS =========== -->
<div id="flashcards" class="screen">
  <div class="fc-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div style="flex:1;font-size:14px;font-weight:600;">Флэшкарты</div>
    <div style="font-size:13px;color:var(--muted);" id="fcTopicName"></div>
  </div>
  <div class="fc-body">
    <div class="fc-counter" id="fcCounter"></div>
    <div class="fc-card" id="fcCard" onclick="flipCard()">
      <div class="fc-side-label" id="fcSideLabel">ТЕРМИН</div>
      <div class="fc-term" id="fcFront"></div>
      <div class="fc-definition" id="fcBack" style="display:none;"></div>
      <div class="fc-flip-hint">Нажмите, чтобы перевернуть</div>
    </div>
    <div class="fc-nav">
      <button onclick="fcPrev()">← Назад</button>
      <button onclick="fcNext()">Вперёд →</button>
    </div>
    <button class="fc-shuffle" onclick="fcShuffle()">🔀 Перемешать</button>
  </div>
</div>

<!-- =========== RESULTS =========== -->
<div id="results" class="screen">
  <div class="results-body">
    <div class="result-trophy" id="resultTrophy">🏆</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-label" id="resultLabel"></div>
    <div class="result-stats" id="resultStats"></div>
    <div class="result-actions">
      <button class="start-btn" onclick="retryQuiz()">🔄 Пройти снова</button>
      <button class="btn-secondary" onclick="goHome()">← На главную</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================

const TOPICS = [
  { id:'t1', name:'Тема 1: Введение в логистику', icon:'📚', qCount:0, fcCount:0 },
  { id:'t2', name:'Тема 2: Цепи поставок', icon:'🔗', qCount:0, fcCount:0 },
  { id:'t3', name:'Тема 3: Прогнозирование и планирование', icon:'📊', qCount:0, fcCount:0 },
  { id:'t4', name:'Тема 4: Снабжение и закупки', icon:'🛒', qCount:0, fcCount:0 },
  { id:'t6', name:'Тема 6: Распределение', icon:'🚚', qCount:0, fcCount:0 },
  { id:'t7', name:'Тема 7: Управление запасами', icon:'📦', qCount:0, fcCount:0 },
  { id:'t8', name:'Тема 8: Инфраструктура', icon:'🏭', qCount:0, fcCount:0 },
  { id:'t9', name:'Тема 9: Логист. услуги и риски', icon:'🛡️', qCount:0, fcCount:0 },
  { id:'all', name:'Все темы', icon:'🎯', qCount:0, fcCount:0 },
];

// ==================== QUESTION BANK ====================
const QUESTIONS = [
  // ---- ТЕМА 1 ----
  { topic:'t1', type:'mcq', text:'Что является задачей логистики согласно курсу?', opts:['Максимизация прибыли через маркетинг','Рациональное управление потоками на основе организационных и координационных решений','Снижение производственных издержек','Управление финансовыми активами компании'], correct:1, explanation:'Задача логистики — рациональное управление материальными, информационными и финансовыми потоками на основе организационных и координационных решений.' },
  { topic:'t1', type:'mcq', text:'Три типа логистических потоков между компанией и её партнёрами:', opts:['Прямой, обратный и смешанный','Информационный, материальный и финансовый','Входящий, внутренний и исходящий','Стратегический, тактический и операционный'], correct:1, explanation:'Три базовых потока: информационный (заказы), материальный (товары) и финансовый (оплата).' },
  { topic:'t1', type:'mcq', text:'Какой этап в истории логистики соответствует 80-м годам XX века?', opts:['Бизнес-логистика','Координирующая логистика','Этап цепей поставок','Интегрированная логистика'], correct:2, explanation:'80-е годы — этап «Цепей поставок»: интеграция функциональных областей логистики вышла за пределы предприятия.' },
  { topic:'t1', type:'mcq', text:'Что такое «фокусная компания» в цепи поставок?', opts:['Компания с наибольшим оборотом в отрасли','Компания, принимающая основные решения по построению и функционированию цепи поставок','Компания, занимающаяся исключительно транспортировкой','Поставщик первого уровня'], correct:1, explanation:'Фокусная компания принимает основные решения по построению и функционированию цепи поставок и формирует систему взаимоотношений с потребителями и партнёрами.' },
  { topic:'t1', type:'mcq', text:'Логистическая стратегия компании — это...', opts:['Финансовый план на год','Часть корпоративной стратегии, направленная на оптимизацию процессов управления материальными потоками','Программа развития персонала логистической службы','Система ценообразования на транспортные услуги'], correct:1, explanation:'Логистическая стратегия — часть корпоративной стратегии, направленная на оптимизацию процессов управления материальными потоками.' },
  { topic:'t1', type:'mcq', text:'Тактический уровень планирования в логистике характеризуется горизонтом:', opts:['Несколько лет','От нескольких месяцев до года','Один день — одна неделя','Более 5 лет'], correct:1, explanation:'Тактический уровень: горизонт от нескольких месяцев до года, шаг планирования — недели или месяцы.' },
  { topic:'t1', type:'multi', text:'Что относится к стратегическому уровню планирования в логистике? (выберите несколько)', opts:['Формирование стратегии цепи поставок','Ежедневная диспетчеризация транспорта','Выбор стратегических партнёров','Управление рисками','Разработка суточных маршрутов'], correct:[0,2,3], explanation:'Стратегический уровень: формирование стратегии, выбор стратегических партнёров, управление рисками, проектирование сети.' },
  { topic:'t1', type:'input', text:'Как называется подход к управлению логистическими системами, рассматривающий систему как совокупность взаимосвязанных бизнес-процессов?', answer:['процессный подход','процессный','пп'], hint:'ОП и ПП — два основных подхода к структурному анализу.', explanation:'Процессный подход (ПП) рассматривает логистическую систему как совокупность взаимосвязанных бизнес-процессов (планирование, выполнение заказов, складирование, транспортировка и т.д.).' },
  { topic:'t1', type:'match', text:'Соотнесите примеры фокусных компаний с отраслями:', pairs:[{term:'Walmart',def:'Розничная торговля'},{term:'Amazon',def:'Электронная коммерция'},{term:'Tesla',def:'Автомобильная промышленность'},{term:'Балтика',def:'Пивоваренная промышленность'}], explanation:'Walmart — ретейл; Amazon — e-commerce; Tesla — авто; Балтика — пиво.' },
  { topic:'t1', type:'mcq', text:'Какая ассоциация в России организует Московский Международный Логистический Форум?', opts:['АРЭ','КСЛ','Совет профессионалов по цепям поставок','Росавтотранс'], correct:1, explanation:'Координационный совет по логистике (КСЛ), основан в 1997 году, организует Московский Международный Логистический Форум.' },
  { topic:'t1', type:'mcq', text:'В 60-е годы формирование какой концепции стало результатом развития бизнес-логистики?', opts:['Зелёной логистики','Реверсивной логистики','Бизнес-логистики','Координирующей логистики'], correct:2, explanation:'В 60-е годы XX века развитие привело к формированию концепции «Бизнес-логистики».' },
  { topic:'t1', type:'mcq', text:'Основной принцип «Координирующей логистики» 70-х годов:', opts:['Принцип нулевых запасов','Принцип общих затрат','Принцип ускоренного товарооборота','Принцип полной автоматизации'], correct:1, explanation:'В 70-е годы реализация принципа общих затрат стала основой «Координирующей логистики».' },

  { topic:'t2', type:'mcq', text:'Что такое SCOR-модель?', opts:['Система управления складом','Референтная модель операций в цепях поставок','Метод расчёта страхового запаса','Программа оптимизации маршрутов'], correct:1, explanation:'SCOR (Supply Chain Operations Reference) — наиболее распространённая референтная модель процессов цепей поставок.' },
  { topic:'t2', type:'mcq', text:'Какой процесс SCOR первого уровня описывает деятельность, связанную с обратным потоком товаров от клиента?', opts:['SOURCE — Закупка','FULFIL — Выполнение','RETURN — Возврат','PLAN — Планирование'], correct:2, explanation:'RETURN (Возврат) — процесс, описывающий деятельность, связанную с обратным потоком товаров, услуг от клиента обратно по цепи поставок.' },
  { topic:'t2', type:'mcq', text:'Что означает аббревиатура MTS в производственных стратегиях?', opts:['Make-To-Stock (производство на склад)','Make-To-Spec (производство по спецификации)','Minimum-Transit-Speed (минимальная скорость транзита)','Managed Transfer System'], correct:0, explanation:'MTS (Make-to-Stock) — производство на склад, выталкивающая стратегия, при которой товары производятся на основе прогнозируемого спроса.' },
  { topic:'t2', type:'mcq', text:'Что такое CODP (Customer Order Decoupling Point)?', opts:['Точка возврата заказа клиентом','Точка разделения заказов клиентов, где происходит переход от прогноза к заказу','Процент дефектных заказов','Центральный операционный диспетчерский пункт'], correct:1, explanation:'CODP — точка разделения заказов клиентов (Market Penetration Point), где происходит переход от выталкивающей стратегии (прогноз) к тянущей (реальный заказ).' },
  { topic:'t2', type:'multi', text:'Какие потоки отображает S-модель (Order-to-Cash)? (выберите все подходящие)', opts:['Поток заказов','Поток товаров','Поток кадровых ресурсов','Поток платежей','Поток информации'], correct:[0,1,3], explanation:'S-модель (O2C) иллюстрирует три ключевых потока: заказов, товаров и платежей.' },
  { topic:'t2', type:'mcq', text:'Что является ключевой особенностью цепей поставок ретейл-компаний?', opts:['Наличие крупных производственных мощностей','Наличие сети розничных магазинов при отсутствии собственных производственных площадок','Прямые поставки без посредников','Полностью автоматизированные склады'], correct:1, explanation:'Особенность ретейл-компаний — наличие сети розничных магазинов и отсутствие собственных производственных площадок.' },
  { topic:'t2', type:'mcq', text:'Атрибут Reliability (Надёжность) в метриках SCOR-модели измеряется через:', opts:['Cash-to-Cash Cycle Time','Perfect Order Fulfillment','Order Fulfillment Cycle Time','Total Supply Chain Management Costs'], correct:1, explanation:'Reliability измеряется через Perfect Order Fulfillment (RL.1.1) — метрику совершенного исполнения заказов.' },
  { topic:'t2', type:'input', text:'Как называется модель совместного планирования, прогнозирования и пополнения запасов в цепях поставок?', answer:['cpfr','cpfr-модель','модель cpfr'], hint:'Аббревиатура из 4 букв: Collaborative Planning, Forecasting, and Replenishment.', explanation:'CPFR (Collaborative Planning, Forecasting, and Replenishment) — модель совместного планирования, прогнозирования и пополнения запасов.' },
  { topic:'t2', type:'match', text:'Соотнесите аббревиатуры с расшифровками:', pairs:[{term:'MTS',def:'Производство на склад'},{term:'MTO',def:'Производство под заказ'},{term:'SCOR',def:'Референтная модель операций ЦП'},{term:'CPFR',def:'Совместное планирование и прогнозирование'}], explanation:'MTS=Make-to-Stock, MTO=Make-to-Order, SCOR=Supply Chain Operations Reference, CPFR=Collaborative Planning, Forecasting, Replenishment.' },
  { topic:'t2', type:'mcq', text:'Какая модель считается наиболее универсальной и широко распространённой среди референтных моделей цепей поставок?', opts:['CPFR','GSCF','SCOR','SCCBP'], correct:2, explanation:'SCOR-модель считается наиболее универсальной и поэтому имеет наибольшее распространение.' },
  { topic:'t2', type:'mcq', text:'Транзитные (перевалочные) склады используются для краткосрочного хранения товаров сроком:', opts:['До 15 суток','До 30 суток','До 90 суток','Более 90 суток'], correct:1, explanation:'Транзитные склады применяются для краткосрочного хранения (до 30 суток).' },

  { topic:'t3', type:'mcq', text:'Качественные методы прогнозирования опираются на:', opts:['Математические модели и исторические данные','Субъективные оценки, мнения экспертов и интуицию','Регрессионный анализ временных рядов','Нейронные сети и машинное обучение'], correct:1, explanation:'Качественные методы прогнозирования опираются на субъективные оценки, мнения экспертов и интуицию.' },
  { topic:'t3', type:'mcq', text:'Что характерно для тактического уровня планирования в цепях поставок?', opts:['Горизонт более 3 лет','Горизонт от месяца до полутора лет, неизменная инфраструктура','Горизонт в один день','Горизонт одна неделя'], correct:1, explanation:'Тактическое планирование: горизонт от месяца до полутора лет, неизменная инфраструктура, объёмное планирование.' },
  { topic:'t3', type:'mcq', text:'Что такое S&OP (Sales & Operations Planning)?', opts:['Система управления складскими операциями','Процесс согласования планов продаж и операций, включающий 5 этапов','Программный модуль для расчёта EOQ','Стандарт ISO по логистике'], correct:1, explanation:'S&OP — процесс балансирования планов продаж, производства и логистики, включает 5 этапов: сбор данных, разработка прогноза, формирование плана поставок, проверка, совещание.' },
  { topic:'t3', type:'mcq', text:'Первый этап процесса S&OP — это:', opts:['Проверка и согласование планов','Разработка прогноза спроса','Сбор данных о результатах предыдущего периода','Совещание руководителей'], correct:2, explanation:'Первый этап S&OP — сбор данных о результатах предыдущего периода (обычно один месяц), анализ рыночных тенденций.' },
  { topic:'t3', type:'multi', text:'Что входит в основные компоненты ECR (Efficient Consumer Response)? (выберите несколько)', opts:['Интегрированный электронный обмен данными (EDI)','Система категорийного менеджмента','Система непрерывного пополнения запасов','Криптовалютные расчёты','Кросс-докинг в распределительных центрах'], correct:[0,1,2,4], explanation:'Основные компоненты ECR: EDI, категорийный менеджмент, система непрерывного пополнения запасов, кросс-докинг.' },
  { topic:'t3', type:'mcq', text:'Несоответствия (exceptions) в модели CPFR — это:', opts:['Ошибки программного обеспечения','Ситуации, требующие особого внимания из-за расхождений в планах, прогнозах или запасах','Отклонения от нормы качества продукции','Нарушения условий контракта'], correct:1, explanation:'Несоответствия (exceptions) в CPFR — ситуации, требующие особого внимания из-за расхождений в планах, прогнозах или уровне запасов.' },
  { topic:'t3', type:'match', text:'Соотнесите структуры управления ЦП с их описаниями:', pairs:[{term:'Линейно-функциональная',def:'Наиболее распространённая структура УЦП'},{term:'Матричная',def:'Двойное подчинение: функциональное и проектное'},{term:'Дивизиональная',def:'Организована по продуктам или регионам'},{term:'Проектно-процессная',def:'Ориентирована на бизнес-процессы, не функции'}], explanation:'Линейно-функциональная — преобладает на практике; матричная — двойное подчинение; дивизиональная — по продуктам/регионам; проектная — по процессам.' },
  { topic:'t3', type:'mcq', text:'Что такое RFID в контексте информационной интеграции цепей поставок?', opts:['Radio Frequency Identification — технология радиочастотной идентификации','Real-time Freight Information Database','Remote Fulfillment & Inventory Dispatch','Regional Financial Integration Department'], correct:0, explanation:'RFID (Radio Frequency Identification) — радиочастотная идентификация. Технология использует радиоволны для автоматической идентификации объектов.' },
  { topic:'t3', type:'mcq', text:'На каком уровне конвергенции SCM-систем решения принимаются в рамках нескольких организаций, входящих в цепь поставок?', opts:['Уровень 1 — аналитика','Уровень 3 — синхронизация','Уровень 4 — оптимизация','Уровень 5 — распределение'], correct:3, explanation:'Уровень 5 (распределение) — решения принимаются в рамках нескольких организаций, входящих в цепь поставок.' },
  { topic:'t3', type:'input', text:'Как называется международная система глобально унифицированных мастер-данных для идентификации товаров?', answer:['gtin','global trade item number'], hint:'Аббревиатура из 4 букв, используется как штрих-код.', explanation:'GTIN (Global Trade Item Numbers) — международная система идентификации товаров, используется для унификации мастер-данных.' },
  { topic:'t3', type:'mcq', text:'Межорганизационные рабочие группы в цепях поставок создаются в целях:', opts:['Постоянного аудита финансовых результатов','Оперативного разрешения конфликтных ситуаций и поддержки решения задач','Принятия обязательных решений для всех участников','Замены функций 3PL-провайдеров'], correct:1, explanation:'Межорганизационные рабочие группы создаются для оперативного разрешения конфликтов, совместного анализа проблем и поддержки задач, требующих постоянного взаимодействия партнёров.' },

  { topic:'t4', type:'mcq', text:'Три взаимосвязанных аспекта деятельности по снабжению:', opts:['Плановый, фактический и отчётный','Маркетинговый, коммерческий и логистический','Стратегический, тактический и операционный','Технический, экономический и правовой'], correct:1, explanation:'Снабжение включает три аспекта: маркетинговый (изучить рынок), коммерческий (заключить контракт) и логистический (осуществить перемещение и хранение).' },
  { topic:'t4', type:'mcq', text:'АВС-классификация основана на принципе Парето. Группа А включает:', opts:['50-60% ассортимента, дающие 5% продаж','30% ассортимента, дающие 15% продаж','20% ассортимента, дающие 80% продаж','5% ассортимента, дающие 95% продаж'], correct:2, explanation:'Группа А — наиболее ценные позиции: 20% ассортимента и 80% продаж.' },
  { topic:'t4', type:'mcq', text:'В XYZ-классификации товары группы X имеют коэффициент вариации:', opts:['Более 25%','10-25%','0-10%','Более 50%'], correct:2, explanation:'Группа X — коэффициент вариации 0-10%, спрос стабильный, легко прогнозируется.' },
  { topic:'t4', type:'mcq', text:'Что такое матрица Кралича?', opts:['Метод оценки надёжности поставщиков','Инструмент классификации товарных категорий по объёму закупок и сложности рынка','Модель расчёта транспортных тарифов','Матрица рисков в цепях поставок'], correct:1, explanation:'Матрица Кралича классифицирует товарные категории по двум осям: объём стоимости товаров и услуг vs сложность рынка поставок.' },
  { topic:'t4', type:'match', text:'Соотнесите квадранты матрицы Кралича с описаниями:', pairs:[{term:'Стратегические категории',def:'Сильное влияние на финансы, узкий рынок поставщиков'},{term:'Категории возможности',def:'Большой объём закупок, много поставщиков'},{term:'Категории — узкие места',def:'Уникальные требования, важный поставщик'},{term:'Некритические категории',def:'Малая значимость, избыточный выбор поставщиков'}], explanation:'Матрица Кралича: стратегические — дефицитные+дорогие; возможности — дешёвые+много альтернатив; узкие места — критически важные+один поставщик; некритические — стандартные+дешёвые.' },
  { topic:'t4', type:'mcq', text:'VMI (Vendor Managed Inventory) — это:', opts:['Виртуальный склад производителя','Технология управления запасами клиента силами поставщика','Система видеомониторинга склада','Метод оценки поставщиков'], correct:1, explanation:'VMI — технология, при которой поставщик берёт на себя управление запасами клиента, самостоятельно принимая решения о пополнении.' },
  { topic:'t4', type:'mcq', text:'Тянущая стратегия снабжения (PULL) характеризуется:', opts:['Закупками крупных партий нерегулярно','Регулярными поставками небольшими партиями, минимальными складскими запасами','Независимостью от конкретного поставщика','Созданием страховых запасов на несколько месяцев'], correct:1, explanation:'Тянущая (PULL) стратегия: регулярные поставки небольшими партиями, минимальные складские мощности и запасы, тесное взаимодействие с поставщиком.' },
  { topic:'t4', type:'input', text:'Как называется информационная система для автоматизации процессов взаимодействия с поставщиками?', answer:['srm','supplier relationship management'], hint:'Аббревиатура из 3 букв.', explanation:'SRM (Supplier Relationship Management) — корпоративная информационная система для автоматизации процессов взаимодействия с поставщиками.' },
  { topic:'t4', type:'multi', text:'Что включает в себя децентрализованная закупка? (выберите все верные)', opts:['Автономия отделов в принятии решений о закупках','Стандартизация всех закупочных процедур','Более быстрая реакция на локальные потребности','Более высокие суммарные издержки','Контроль из одного центра'], correct:[0,2,3], explanation:'Децентрализованная закупка: автономия отделов, быстрая реакция на локальные потребности, но более высокие суммарные издержки.' },
  { topic:'t4', type:'mcq', text:'Результат группы AX в совместном ABC-XYZ анализе:', opts:['Высокая выручка, непредсказуемый спрос','Низкая выручка, стабильный спрос','Высокая выручка и стабильный спрос — приоритет для управления','Средняя выручка, умеренные колебания'], correct:2, explanation:'Группа AX: самые выгодные для продажи позиции со стабильным спросом — приоритет для управления и расширения ассортимента.' },
  { topic:'t4', type:'mcq', text:'Для каких предприятий преимущественно используются стратегии поставок (тянущая и толкающая)?', opts:['Малого бизнеса и ИП','Крупных предприятий и корпораций','Государственных учреждений','Некоммерческих организаций'], correct:1, explanation:'Стратегии поставок (тянущая/толкающая) используются обычно крупными предприятиями или корпорациями, так как они относительно сложны в реализации.' },

  // ---- ТЕМА 6 ----
  { topic:'t6', type:'mcq', text:'Что такое кросс-докинг центр?', opts:['Склад для длительного хранения товаров','Объект для переформирования товарных потоков без промежуточного хранения','Таможенный склад временного хранения','Распределительный центр с холодильными камерами'], correct:1, explanation:'Кросс-докинг — переформирование товарных потоков без промежуточного хранения, может дополняться маркировкой и переупаковкой.' },
  { topic:'t6', type:'mcq', text:'Стратегия эксклюзивного сбыта предполагает:', opts:['Максимально широкое присутствие в точках продаж','Предоставление прав на распределение ограниченному числу посредников','Работу только через интернет-магазины','Отказ от посредников в пользу прямых продаж'], correct:1, explanation:'Эксклюзивный сбыт: права на распределение предоставляются ограниченному числу посредников (иногда единственному), максимальный контроль над каналом.' },
  { topic:'t6', type:'mcq', text:'Чем дистрибьютор отличается от «классической» компании оптовой торговли?', opts:['Дистрибьютор устанавливает цену самостоятельно','Дистрибьютор имеет исключительное право реализации на оговорённой территории','Дистрибьютор работает только с государственными компаниями','Дистрибьютор не несёт ответственности за качество товара'], correct:1, explanation:'Дистрибьютор имеет исключительное право реализации на оговорённой территории и работает по договору об оптовом распределении товаров.' },
  { topic:'t6', type:'match', text:'Соотнесите типы систем распределения с характеристиками:', pairs:[{term:'Собственная система',def:'Максимальное влияние на каналы, полный административный контроль'},{term:'Независимая система',def:'Свобода в выборе каналов, отсутствие контроля над потоками'},{term:'Связанная система',def:'Сочетает преимущества собственной и независимой систем'},{term:'Франчайзинг',def:'Привилегии на производство/сбыт при сохранении торговой марки'}], explanation:'Собственная — макс. контроль; независимая — мин. контроль; связанная — договорные отношения; франчайзинг — права на бренд.' },
  { topic:'t6', type:'mcq', text:'Фулфилмент-центр отличается от распределительного центра тем, что:', opts:['Хранит только скоропортящиеся товары','Обслуживает конечных потребителей: принимает заказы, организует доставку до двери, обрабатывает возвраты','Работает только с производственными предприятиями','Является таможенным складом'], correct:1, explanation:'Фулфилмент-центр — РЦ, обслуживающий конечных потребителей: прием заказов, кастомизация, доставка «до двери», обработка возвратов.' },
  { topic:'t6', type:'mcq', text:'Многоканальный (multichannel) сбыт характеризуется:', opts:['Полной интеграцией всех каналов с единой информацией о клиентах','Независимостью каналов и отсутствием передачи информации между ними','Использованием только одного канала продаж','Обязательным наличием физических магазинов'], correct:1, explanation:'Многоканальный сбыт: независимость каналов, различные условия продажи, отсутствие передачи информации о клиентах между каналами.' },
  { topic:'t6', type:'mcq', text:'В каком возрасте жизненного цикла товара удельные логистические издержки очень высоки?', opts:['Зрелость','Рост','Упадок','Внедрение'], correct:3, explanation:'На этапе внедрения статистика продаж отсутствует, нужна максимальная доступность, поэтому удельные логистические издержки очень высоки.' },
  { topic:'t6', type:'multi', text:'Что обеспечивает интеграция участников системы распределения? (выберите несколько)', opts:['Информационную прозрачность','Быстроту реагирования на изменения','Гарантированное отсутствие конкуренции','Снижение издержек за счёт эффекта масштаба','Увеличение рыночной власти'], correct:[0,1,3,4], explanation:'Интеграция в каналах распределения: информационная прозрачность, быстрота реагирования, снижение издержек за счёт масштаба, увеличение рыночной власти.' },
  { topic:'t6', type:'input', text:'Как называется концепция продаж, использующая несколько интегрированных каналов с единой информацией о клиентах и товарах?', answer:['омниканальный','omnichannel','омниканальный сбыт'], hint:'В отличие от multichannel, все каналы связаны между собой.', explanation:'Омниканальный сбыт — интеграция всех каналов продаж с единой информацией о клиентах, товарах и заказах.' },
  { topic:'t6', type:'mcq', text:'Продукция промышленного назначения продаётся преимущественно через:', opts:['Длинные каналы через многих посредников','Короткие, часто прямые каналы с долгосрочными контрактами','Розничные магазины и торговые центры','Социальные сети и маркетплейсы'], correct:1, explanation:'Каналы для промышленной продукции: короткие и прямые, часто долгосрочные контракты, технические поставки крупными партиями.' },

  // ---- ТЕМА 7 ----
  { topic:'t7', type:'mcq', text:'Что такое «запас» с точки зрения логистики?', opts:['Финансовые резервы компании','Любые изделия или сырьё, ожидающие использования; часть материального потока с нулевой скоростью','Избыточное производственное оборудование','Нераспределённая прибыль'], correct:1, explanation:'Запас — любые изделия или сырьё, ожидающие использования в процессе производства, торговли или конечного потребления; часть материального потока с нулевой скоростью.' },
  { topic:'t7', type:'mcq', text:'Формула EOQ (Economic Order Quantity) — формула Уилсона:', opts:['EOQ = 2DS/H','EOQ = √(2DS/H)','EOQ = D/(2S×H)','EOQ = H×S/2D'], correct:1, explanation:'EOQ = √(2DS/H), где D — годовое потребление, S — затраты на размещение заказа, H — затраты на хранение единицы товара в год.' },
  { topic:'t7', type:'mcq', text:'«Эффект хлыста» в управлении запасами — это:', opts:['Сезонные колебания запасов','Нарастание ошибки прогнозирования по мере движения вверх по цепи поставок','Резкое снижение запасов при форс-мажоре','Регулярные плановые пополнения запасов'], correct:1, explanation:'Эффект хлыста — нарастающая ошибка прогнозирования при движении вверх по цепи поставок: малые колебания спроса у клиента превращаются в большие у поставщика.' },
  { topic:'t7', type:'mcq', text:'В модели с фиксированным объёмом заказа (FRQ):', opts:['Заказ делается строго по расписанию, объём варьируется','Размер заказа постоянен, время заказа определяется пороговым уровнем запаса','Объём и периодичность устанавливаются ежемесячно','Поставщик сам определяет объём поставки'], correct:1, explanation:'Модель с фиксированным объёмом: размер заказа постоянный, заказ делается при достижении порогового уровня (точки заказа).' },
  { topic:'t7', type:'mcq', text:'Страховой запас в модели с фиксированным объёмом рассчитывается как:', opts:['Среднедневное потребление × время выполнения заказа','Задержка поставки × суточное потребление','Максимальный желательный запас − страховой запас','Объём заказа / суточное потребление'], correct:1, explanation:'Страховой запас = возможная максимальная задержка поставки × расчётное потребление в сутки.' },
  { topic:'t7', type:'multi', text:'Последствия «эффекта хлыста» в цепях поставок: (выберите все верные)', opts:['Избыточные запасы во всех звеньях цепи','Снижение запасов у поставщиков','Дефицит товара у конечных пользователей','Увеличение цикла выполнения заказа','Конфликты и недоверие между участниками цепи'], correct:[0,2,3,4], explanation:'Эффект хлыста: избыточные запасы, дефицит у пользователей, увеличение цикла выполнения заказа, конфликты.' },
  { topic:'t7', type:'match', text:'Соотнесите группы АВС с рекомендациями по управлению запасами:', pairs:[{term:'Группа A (20%, 80%)',def:'Тщательный контроль, частая инвентаризация, хранение близко к потреблению'},{term:'Группа B (30%, 15%)',def:'Обычный контроль, EOQ, хранение на региональных складах'},{term:'Группа C (50%, 5%)',def:'Простейший контроль, мин-макс, хранение на центральных складах'}], explanation:'А — максимальное внимание; В — средний контроль; С — минимальный контроль и крупные партии.' },
  { topic:'t7', type:'mcq', text:'Модель с фиксированной периодичностью заказа по сравнению с моделью с фиксированным объёмом имеет:', opts:['Более низкий риск дефицита','Меньшие складские площади','Более высокий риск дефицита, но не требует постоянного контроля запаса','Всегда более высокие издержки'], correct:2, explanation:'Модель с фиксированной периодичностью: больший риск дефицита (нет моментального реагирования на снижение запаса), но не требует непрерывного контроля.' },
  { topic:'t7', type:'input', text:'Как называются системы, помогающие в комплексе управлять запасами, закупками и поставками? (аббревиатура из 3 букв русскими или латинскими буквами)', answer:['суз','ims','inventory management system','im'], hint:'СУЗ — системы управления запасами.', explanation:'СУЗ (Inventory Management Systems, IMS) — автоматизированные системы управления запасами.' },
  { topic:'t7', type:'mcq', text:'Какой подход к управлению запасами впервые был явно реализован в производственной системе Toyota?', opts:['Максимизация запасов','Оптимизация запасов','Минимизация запасов','Стохастическое управление'], correct:2, explanation:'Минимизация запасов — подход, впервые в явном виде реализованный в производственной системе Toyota (система JIT/Lean).' },

  // ---- ТЕМА 8 ----
  { topic:'t8', type:'mcq', text:'Классификация складских помещений ABCD в России основана на разработках компаний:', opts:['McKinsey и BCG','Knight Frank и Swiss Realty Group','PwC и Deloitte','CBRE и JLL'], correct:1, explanation:'ABCD-классификация складских помещений в России основана на разработках Knight Frank и Swiss Realty Group. Существует две разновидности — с подклассами A+/B+ и A1/A2/B1/B2.' },
  { topic:'t8', type:'mcq', text:'Склад класса D — это:', opts:['Современное каркасное здание с высотой потолков от 12 м','Доперестроечное здание с базовыми характеристиками','Здание, не предназначенное для складирования (гаражи, подвалы, ангары)','Специализированный холодильный склад'], correct:2, explanation:'Класс D — здания, изначально не созданные для складирования: гаражи, подвалы, ангары, сельскохозяйственные постройки.' },
  { topic:'t8', type:'mcq', text:'Три уровня решений относительно складов:', opts:['Стратегический, тактический, операционный','Формирование сети, проектирование системы хозяйства, разработка логистических процессов','Строительство, аренда, аутсорсинг','Принять, разместить, отгрузить'], correct:1, explanation:'Три уровня: 1) формирование складской сети, 2) проектирование системы складского хозяйства, 3) разработка логистических процессов на складе.' },
  { topic:'t8', type:'mcq', text:'Транзитный (перевалочный) склад применяется для краткосрочного хранения и является складом:', opts:['Длительного хранения','Транспортных терминалов','Производственного назначения','Таможенного контроля'], correct:1, explanation:'Транзитные склады — склады транспортных терминалов для краткосрочного хранения (до 30 суток).' },
  { topic:'t8', type:'match', text:'Соотнесите тип склада с его характеристикой:', pairs:[{term:'Производственный',def:'Хранение материалов вблизи производства, кратковременное'},{term:'Распределительный центр (РЦ)',def:'Хранение + сортировка, упаковка, маркировка, обслуживает точки продаж'},{term:'Резервный',def:'Компенсация рисков от разрывов в поставках'},{term:'Таможенный',def:'Хранение при перемещении через таможенную границу'}], explanation:'Производственный — при заводе; РЦ — сортировка и хранение; резервный — страховка от сбоев; таможенный — при пересечении границы.' },
  { topic:'t8', type:'mcq', text:'Тенденции развития складов включают:', opts:['Увеличение доли ручного труда','Специализацию, механизацию, автоматизацию и роботизацию операций','Сокращение числа складов в цепях поставок','Полный отказ от собственных складов'], correct:1, explanation:'Тенденции: специализация по видам товаров, механизация, автоматизация и роботизация операций, информатизация управления.' },
  { topic:'t8', type:'multi', text:'Что входит в «классический» набор складских операций? (выберите несколько)', opts:['Приём','Сортировка','Маркетинговые исследования','Комплектация','Упаковка','Аудит финансовой отчётности'], correct:[0,1,3,4], explanation:'Классические складские операции: приём, сортировка, комплектация, упаковка, отпуск и отгрузка товаров.' },
  { topic:'t8', type:'input', text:'Как называется оборот товара, при котором происходит 3-5 ротаций в месяц?', answer:['быстрый','быстрый оборот'], hint:'Оборот товаров бывает быстрый, средний и длительный.', explanation:'Быстрый оборот: 3-5 раз в месяц. Средний — 1-2 в месяц. Длительный — 0,25-1 в месяц.' },
  { topic:'t8', type:'mcq', text:'Сеть поставок сырья в логистической системе крупного производителя включает:', opts:['Только дистрибьюторов и розничные сети','Компании-поставщики сырьевых товаров и комплектующих','Только транспортных партнёров','Фокусную компанию и конечных потребителей'], correct:1, explanation:'Сеть поставок сырья включает компании-поставщики сырьевых товаров и комплектующих.' },
  { topic:'t8', type:'mcq', text:'Что обеспечивает национальная логистическая инфраструктура?', opts:['Исключительно таможенные процедуры','Совокупность складов, транспортных терминалов, РЦ и других объектов, образующих единую сеть с путями сообщения','Только автомобильные и железные дороги','Управление финансовыми потоками в экономике'], correct:1, explanation:'Национальная логистическая инфраструктура — совокупность складов, терминалов, РЦ, кросс-докинговых площадок и других объектов совместно с путями сообщения.' },

  // ---- ТЕМА 9 (9.1 + 9.2) ----
  { topic:'t9', type:'mcq', text:'Рынок логистических услуг — это:', opts:['Биржа транспортных компаний','Сегмент экономики, где профессиональные операторы за вознаграждение предоставляют логистические услуги третьим лицам','Государственная система контроля грузоперевозок','Рейтинг крупнейших логистических компаний'], correct:1, explanation:'Рынок логистических услуг — сегмент экономики, в котором профессиональные операторы (логистические провайдеры) за вознаграждение предоставляют услуги логистики третьим лицам.' },
  { topic:'t9', type:'mcq', text:'3PL-провайдер отличается от 2PL тем, что:', opts:['Работает только с одним клиентом','Может объединять грузопотоки нескольких клиентов и оказывает более широкий спектр услуг','Занимается только складированием','Предоставляет только страховые услуги'], correct:1, explanation:'3PL-провайдер обслуживает нескольких клиентов (например, объединяет грузопотоки поставщиков A и C) и предоставляет более широкий комплекс логистических услуг.' },
  { topic:'t9', type:'mcq', text:'4PL-провайдер (Lead Logistics Provider) — это:', opts:['Компания, владеющая крупнейшим парком грузовых автомобилей','Провайдер, управляющий несколькими 3PL-операторами и интегрирующий цепь поставок','Государственная логистическая компания','Провайдер только авиационных перевозок'], correct:1, explanation:'4PL (Lead Logistics Provider) — провайдер, интегрирующий работу нескольких 3PL-компаний и управляющий всей цепью поставок клиента.' },
  { topic:'t9', type:'mcq', text:'«Чёрный лебедь» по Н. Талебу применительно к современным цепям поставок — это:', opts:['Идеальная цепь поставок','Сочетание кризисных факторов (финансовый кризис, пандемия, санкции), имеющее признаки непредвиденного события','Стратегия снижения рисков','Тип 4PL-провайдера'], correct:1, explanation:'«Чёрный лебедь» — непредвиденное событие с огромными последствиями. Сочетание трёх кризисных факторов (финансовый кризис, COVID-19, санкции) имеет его признаки.' },
  { topic:'t9', type:'mcq', text:'Nearshoring (China+) в контексте реконфигурации цепей поставок означает:', opts:['Перенос производства на другой континент','Поиск поставщиков в «дружественных» или географически близких странах','Полный отказ от международных поставок','Создание собственного производства за рубежом'], correct:1, explanation:'Nearshoring/China+ — глобальная тенденция поиска поставщиков в «дружественных» или географически близких странах. Для России — часто единственная реальная альтернатива.' },
  { topic:'t9', type:'match', text:'Соотнесите уровни логистических провайдеров с описаниями:', pairs:[{term:'1PL',def:'Компания выполняет логистику своими силами'},{term:'2PL',def:'Транспортировка и складирование отдаются одному провайдеру'},{term:'3PL',def:'Комплексный аутсорсинг логистики нескольким провайдерам или одному'},{term:'4PL',def:'Провайдер управляет всей цепью поставок, интегрируя 3PL'}], explanation:'1PL — сами; 2PL — одна транспортно-складская компания; 3PL — комплексный аутсорсинг; 4PL — управление всей цепью.' },
  { topic:'t9', type:'mcq', text:'Функция с наибольшим % аутсорсинга по данным исследований США (2020-е годы):', opts:['Управление запасами (Inventory Management)','Внутренняя транспортировка (Domestic Transportation)','Таможенное оформление (Customs Brokerage)','Кросс-докинг (Cross-Docking)'], correct:1, explanation:'Domestic Transportation — внутренняя транспортировка — занимает 81% и лидирует по доле аутсорсинга.' },

  { topic:'t7', type:'mcq', text:'Максимальный желательный запас в модели с фиксированным объёмом заказа:', opts:['Страховой запас + объём заказа','Пороговый уровень + объём заказа','Только страховой запас','Половина объёма заказа'], correct:0, explanation:'Максимальный желательный запас = страховой запас + объём заказа.' },
  { topic:'t7', type:'mcq', text:'Пороговый уровень запаса (точка заказа):', opts:['Страховой запас минус потребление за время выполнения заказа','Расчётное потребление за время выполнения заказа плюс страховой запас','Только максимальный желательный запас','Половина максимального желательного запаса'], correct:1, explanation:'Пороговый уровень = потребление за время выполнения заказа + страховой запас.' },
  { topic:'t7', type:'mcq', text:'Циклический контроль запасов отличается от полной инвентаризации тем, что:', opts:['Проводится раз в год','Пересчитывается часть запасов по графику без остановки работы','Требует остановки работы склада','Проводится без документов'], correct:1, explanation:'Циклический контроль — пересчёт части запасов по заранее установленному графику, интегрируется в обычный рабочий процесс.' },
  { topic:'t7', type:'multi', text:'Какие подходы к управлению запасами применяются сегодня? (выберите все)', opts:['Максимизация запасов','Оптимизация запасов','Минимизация запасов','Ликвидация всех запасов'], correct:[0,1,2], explanation:'На практике применяются все три подхода в зависимости от ситуации и стратегии.' },
  { topic:'t7', type:'mcq', text:'При каком виде контроля запасов управляющие решения принимаются в любой момент?', opts:['Периодический контроль','Циклический контроль','Постоянный (непрерывный) контроль','Разовая инвентаризация'], correct:2, explanation:'Постоянный контроль — непрерывный учёт состояния запасов, решения принимаются в любой момент времени.' },
  { topic:'t7', type:'match', text:'Соотнесите модели управления запасами с характеристиками:', pairs:[{term:'Фиксированный объём заказа',def:'Постоянная партия, переменный интервал, непрерывный мониторинг'},{term:'Фиксированная периодичность',def:'Фиксированный интервал между заказами, переменный объём'},{term:'Минимум-максимум',def:'Пополнение при достижении минимума до максимального уровня'}], explanation:'Фикс. объём — постоянная партия; фикс. периодичность — по расписанию; мин-макс — пополнение при достижении нижней границы.' },

  // ---- ТЕМА 8 дополнительные ----
  { topic:'t8', type:'mcq', text:'WMS (Warehouse Management System) рекомендуется при:', opts:['Номенклатуре менее 100 артикулов','Номенклатуре более 1000 артикулов или площади свыше 1000 кв. м','Только при наличии кросс-докинга','Исключительно для складов класса А'], correct:1, explanation:'WMS необходима при номенклатуре более 1000 артикулов или площади склада свыше 1000 кв. метров.' },
  { topic:'t8', type:'mcq', text:'WCS (Warehouse Control System) выполняет функцию:', opts:['Управление товарными запасами в ERP','Управление автоматизированным оборудованием в реальном времени — посредник между WMS/ERP и оборудованием','Планирование маршрутов транспортировки','Управление взаимоотношениями с клиентами'], correct:1, explanation:'WCS — ПО для управления автоматизированным оборудованием в реальном времени. Посредник между WMS/ERP и оборудованием склада.' },
  { topic:'t8', type:'mcq', text:'Схема планировки склада «U» применяется:', opts:['Только для малых складов','Только для больших складов','Для складов любого размера; зоны погрузки и разгрузки рядом','Только для таможенных складов'], correct:2, explanation:'U-схема пригодна для любого размера. Зоны погрузки и разгрузки рядом, между ними — зона кросс-докинга или быстрого оборота.' },
  { topic:'t8', type:'mcq', text:'Ричтрак как складское оборудование — это:', opts:['Ручная тележка с гидравликой','Штабелер с выдвижными вилами, высота подъёма до 12 м','Вилочный погрузчик 1,5 т','Конвейер для сортировки'], correct:1, explanation:'Ричтрак — штабелер с выдвижными вилами, высота подъёма до 12 метров, мачта может наклоняться.' },
  { topic:'t8', type:'multi', text:'Предпосылки автоматизации складов: (выберите несколько)', opts:['Дефицит трудовых ресурсов','Рост объёмов заказов и ассортимента','Снижение требований к скорости','Ужесточение требований по скорости выполнения заказов'], correct:[0,1,3], explanation:'Предпосылки: дефицит трудовых ресурсов, рост объёмов и ассортимента, ужесточение требований по скорости.' },
  { topic:'t8', type:'match', text:'Соотнесите технологические зоны склада с функциями:', pairs:[{term:'Зона разгрузки',def:'Выгрузка товара, проверка целостности грузовых мест'},{term:'Зона приёмки',def:'Проверка количества и качества, сверка документации'},{term:'Зона хранения',def:'Размещение товара на стеллажи и другие носители'},{term:'Зона кросс-докинга',def:'Переформирование отправок без промежуточного хранения'}], explanation:'Разгрузка — выгрузка; приёмка — проверка; хранение — размещение; кросс-докинг — без хранения.' },
  { topic:'t8', type:'mcq', text:'Преимущество кросс-докинга:', opts:['Максимальные запасы на складе','Отсутствие промежуточного хранения, снижение запасов и потребности в складских площадях','Длительное хранение широкого ассортимента','Подходит только для скоропортящихся товаров'], correct:1, explanation:'Кросс-докинг: нет промежуточного хранения, снижение запасов, меньше площадей, ускорение товародвижения.' },
  { topic:'t8', type:'mcq', text:'Распределительный центр (РЦ) отличается от обычного склада тем, что:', opts:['Хранит только товары категории А','Фокусируется на хранении и распределении больших объёмов, часто имеет ж/д пути','Обслуживает только конечных онлайн-покупателей','Не выполняет операций с товаром'], correct:1, explanation:'РЦ — крупный объект для хранения и распределения больших объёмов. Ключевой элемент управления запасами, часто с ж/д путями.' },
  { topic:'t8', type:'input', text:'Как называется технология хранения, при которой товар размещается на любое свободное место без фиксированного адреса?', answer:['динамическое хранение','динамическое'], hint:'Противоположность — статичное (адресное) хранение.', explanation:'Динамическое хранение — товар на любое свободное место; WMS отслеживает адрес каждой позиции, что повышает эффективность использования площади.' },
  { topic:'t8', type:'mcq', text:'Автотранспортный терминал как объект логистической инфраструктуры:', opts:['Имеет большую зону стеллажного хранения','Основная технология — кросс-докинг, не имеет зон стеллажного хранения, доки вдоль всех стен','Хранит товары более 90 суток','Обслуживает только авиационные грузы'], correct:1, explanation:'Автотранспортный терминал: основная технология — кросс-докинг, нет зон стеллажного хранения, доки занимают всю длину стен.' },
  { topic:'t8', type:'mcq', text:'Функция склада «консолидация» означает:', opts:['Разбивку крупных партий на мелкие для нескольких получателей','Объединение партий от нескольких поставщиков в одну поставку потребителю','Долгосрочное хранение товаров','Таможенное оформление грузов'], correct:1, explanation:'Консолидация — объединение партий товаров от нескольких поставщиков в единую поставку для одного потребителя.' },

  // ---- ТЕМА 9 дополнительные ----
  { topic:'t9', type:'mcq', text:'Что принципиально даёт 3PL-провайдер клиенту?', opts:['Только транспортное средство','Профессиональные знания в управлении логистикой, интеграцию потоков, терминальные ресурсы','Исключительно таможенное оформление','Только складскую площадь в аренду'], correct:1, explanation:'3PL даёт: профессиональные знания, системные решения, интеграцию потоков клиентов, использование терминальных ресурсов.' },
  { topic:'t9', type:'mcq', text:'Наиболее ценный актив 3PL-провайдера — это:', opts:['Торговые марки и бренды','Терминалы, играющие роль хабов в логистике клиента','Производственные мощности','Права интеллектуальной собственности'], correct:1, explanation:'Наиболее ценный актив 3PL — терминалы, которые в логистике клиента играют роль хабов.' },
  { topic:'t9', type:'mcq', text:'Реконфигурация цепей поставок — это:', opts:['Ежегодная корректировка KPI','Комплекс действий по обеспечению стабильности цепи в условиях внешней неопределённости','Смена логотипа компании','Аудит финансовых показателей'], correct:1, explanation:'Реконфигурация ЦП — комплекс действий по обеспечению стабильности цепи в условиях внешней неопределённости.' },
  { topic:'t9', type:'mcq', text:'Вариант 3 «Треугольника стабильности» по Barroso означает:', opts:['Параметр ЦП полностью не восстанавливается','Параметр восстанавливается до прежнего уровня','Параметр превышает прежнее значение после восстановления — наилучший исход','Параметр немедленно выходит из строя'], correct:2, explanation:'Вариант 3: после внешнего воздействия и восстановления параметр ЦП превышает прежнее значение — наилучший исход.' },
  { topic:'t9', type:'multi', text:'Стратегические решения при реконфигурации ЦП в кризисных условиях: (выберите несколько)', opts:['Сохранение существующих поставщиков','Поиск новых поставщиков в дружественных странах','Полный отказ от международных поставок','Локализация поставок'], correct:[0,1,3], explanation:'Три стратегии реконфигурации: сохранение существующих поставщиков, поиск новых в дружественных странах, локализация поставок.' },
  { topic:'t9', type:'mcq', text:'Общая проблема ЦП в кризисные годы — ориентация на:', opts:['Избыточные инвестиции в инфраструктуру','Максимальную экономическую эффективность в ущерб надёжности','Слишком много поставщиков и посредников','Отсутствие цифровых технологий'], correct:1, explanation:'Ключевая проблема: ориентация на максимальную экономическую эффективность в ущерб надёжности.' },
  { topic:'t9', type:'mcq', text:'Специализированная TMS-система нужна, когда:', opts:['В компании один водитель и маршрут','Нет единого пространства для операторов, стандартные блоки АСУ не обеспечивают оптимизацию','Все перевозки собственным транспортом','Компания не занимается доставкой'], correct:1, explanation:'TMS нужна: когда нет единого пространства для транспортных операторов, стандартные блоки АСУ не обеспечивают оптимизацию, растёт сложность маршрутизации.' },
  { topic:'t9', type:'match', text:'Соотнесите меры стабилизации ЦП с периодами:', pairs:[{term:'Антикризисные структуры (экстренно)',def:'Штабы или временные рабочие группы'},{term:'Антикризисные структуры (долгосрочно)',def:'Функции обязательны для всех структурных подразделений'},{term:'Увеличение запасов (экстренно)',def:'Рост до максимально допустимого уровня'},{term:'Ускорение решений (долгосрочно)',def:'Ключевое требование к системе управления ЦП'}], explanation:'Меры различаются по горизонту: экстренные — немедленная реакция; долгосрочные — новая корпоративная культура.' },

  // ---- БЛОК 3: углублённые и расчётные вопросы ----
  // --- Тема 1 ---
  { topic:'t1', type:'mcq', text:'Гибридная организационная структура логистической службы — это:', opts:['Структура, полностью исключающая подразделения','Сочетание двух типов структур, например линейно-функциональной и дивизиональной','Структура только из временных рабочих групп','Аутсорсинг всех логистических функций'], correct:1, explanation:'Гибридная (смешанная) структура сочетает две и более типа организационных структур, например линейно-функциональную и дивизиональную.' },
  { topic:'t1', type:'mcq', text:'Система сбалансированных показателей (BSC) в логистике используется для:', opts:['Ценообразования на транспортные услуги','Трансформации корпоративных целей в показатели логистики через 4 составляющие','Расчёта экономичного размера заказа','Классификации поставщиков'], correct:1, explanation:'Показатели BSC (финансовая, клиентская, внутренняя, обучение и развитие) трансформируются в показатели логистики компании.' },
  { topic:'t1', type:'mcq', text:'Три функциональные области логистики 70-х годов:', opts:['Транспорт, склад, таможня','Снабжение, производство, распределение','Закупки, хранение, продажи','Планирование, выполнение, контроль'], correct:1, explanation:'В 70-е годы (эпоха «координирующей логистики») выделились три функциональные области: снабжение, производство и распределение.' },
  { topic:'t1', type:'input', text:'Как называется российская некоммерческая ассоциация, основанная в 1991 году, объединяющая экспедиторские и логистические организации, член FIATA?', answer:['арэ','российская ассоциация экспедиторских и логистических организаций'], hint:'Аббревиатура из трёх букв.', explanation:'АРЭ — Российская ассоциация экспедиторских и логистических организаций, основана в 1991 году, член Международной федерации экспедиторских ассоциаций (FIATA).' },

  // --- Тема 2 ---
  { topic:'t2', type:'mcq', text:'В SCOR-метриках атрибут Costs (Затраты) на уровне 1 измеряется через:', opts:['Perfect Order Fulfillment','Order Fulfillment Cycle Time','Total Supply Chain Management Costs','Supply Chain Agility'], correct:2, explanation:'Атрибут Costs (CO) уровня 1 измеряется через Total Supply Chain Management Costs (CO.1.1) и Cost of Goods Sold (CO.1.2).' },
  { topic:'t2', type:'mcq', text:'Что описывает атрибут Sustainability (Устойчивость) в расширенных метриках SCOR?', opts:['Скорость поставки','Экологические и социальные показатели цепи поставок (материалы, энергия, вода, выбросы)','Точность прогнозирования спроса','Уровень сервиса'], correct:1, explanation:'Атрибут Sustainability (EV) — экологические показатели: используемые материалы, энергия, вода, парниковые газы, отходы; плюс социальные (SC): разнообразие, уровень оплаты, обучение.' },
  { topic:'t2', type:'mcq', text:'Идеальная цепь поставок обеспечивает одновременно:', opts:['Максимальные запасы и высокие издержки','100% исполнение заказов, нулевой запас, минимальные издержки и предельную гибкость','Только скорость поставки без учёта затрат','Исключительно снижение затрат за счёт качества'], correct:1, explanation:'Идеальная ЦП: 100% исполнение заказов в срок, нулевой запас, 100% использование мощностей без переналадки, минимальная стоимость производства, предельная гибкость.' },
  { topic:'t2', type:'input', text:'Как называется модель лучших практик цепей поставок, разработанная Консорциумом Томпкинса?', answer:['sccbp','sccbp-модель','supply chain consortium best practice framework'], hint:'Аббревиатура из 5 букв.', explanation:'SCCBP (Supply Chain Consortium Best Practice Framework) — модель лучших практик цепей поставок, разработанная Консорциумом Томпкинса (Tompkins Supply Chain Consortium).' },

  // --- Тема 3 ---
  { topic:'t3', type:'mcq', text:'Что такое S&OP совещание руководителей (5-й этап)?', opts:['Оперативное собрание водителей','Финальное утверждение сбалансированного плана высшим руководством компании','Ежедневная планёрка отдела закупок','Встреча с поставщиками для пересмотра контрактов'], correct:1, explanation:'Пятый этап S&OP — совещание высшего руководства: сбалансированный план передаётся на рассмотрение и утверждение; проверяется реалистичность и соответствие стратегическим целям.' },
  { topic:'t3', type:'mcq', text:'Несоответствия в прогнозах (CPFR) возникают, когда:', opts:['Товары повреждены в пути','Фактические продажи существенно отклоняются от ожидаемых значений','Партнёры не подписали соглашение','Склад переполнен'], correct:1, explanation:'Несоответствия в прогнозах (forecast exceptions) — случаи, когда фактические продажи или спрос существенно отклоняются от ожидаемых значений.' },
  { topic:'t3', type:'mcq', text:'Уровень конвергенции 4 (Оптимизация) в SCM-системах означает:', opts:['Компоненты не связаны','Данные передаются в одностороннем порядке','Планирование в одной функциональной области с учётом другой (например, доставка с учётом комплектации)','Решения в рамках нескольких организаций'], correct:2, explanation:'Уровень 4 (оптимизация): планирование процессов одной функциональной области (например, доставки) выполняется с учётом другой (например, комплектации на складе).' },
  { topic:'t3', type:'input', text:'Как называется процесс согласования планов продаж и операций из 5 этапов: сбор данных, разработка прогноза, формирование плана поставок, проверка, совещание?', answer:['s&op','sop','sales and operations planning'], hint:'Аббревиатура из 4 символов.', explanation:'S&OP (Sales & Operations Planning) — процесс балансирования планов продаж, производства и логистики.' },
